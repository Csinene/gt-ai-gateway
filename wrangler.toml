name = "gt-ai-gateway"
main = "src/index.ts"
compatibility_date = "2025-01-19"

compatibility_flags = [ "nodejs_compat", "no_handle_cross_request_promise_resolution" ]


[vars]
# ROOT_TOKEN = "your-root-token-here"

# [[kv_namespaces]]
# binding = "MY_KV_NAMESPACE"
# id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# [[r2_buckets]]
# binding = "MY_BUCKET"
# bucket_name = "my-bucket"

[[d1_databases]]
binding = "DB"
database_name = "ModelChatDB"
database_id = "e07db91a-a5cf-4b69-bf18-a3fdcb92e7d5"

# [ai]
# binding = "AI"

[observability]
enabled = true
head_sampling_rate = 1

[assets]
directory = "frontend/dist"
binding = "ASSETS"
